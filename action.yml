name: 'claude-init'
description: 'Generate or check AI context files (CLAUDE.md, AGENTS.md, Cursor/Windsurf/Cline rules, GEMINI.md, Copilot, and more)'
author: 'Horia Stan'
branding:
  icon: 'file-text'
  color: 'purple'

inputs:
  command:
    description: 'Which command to run: "check" (verify files are up to date, fails on drift) or "generate"'
    required: false
    default: 'check'
  directory:
    description: 'Project directory to analyze'
    required: false
    default: '.'
  targets:
    description: 'Comma-separated target ids, or "all"'
    required: false
    default: 'all'
  args:
    description: 'Extra CLI flags passed through verbatim (e.g. "--overwrite --recurse")'
    required: false
    default: ''
  version:
    description: 'npm version or dist-tag of @horiastanxd/claude-init to run'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_TARGETS: ${{ inputs.targets }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        case "$INPUT_COMMAND" in
          check|generate) ;;
          *) echo "claude-init: command must be 'check' or 'generate' (got '$INPUT_COMMAND')"; exit 1 ;;
        esac
        [[ "$INPUT_VERSION" =~ ^[A-Za-z0-9._@/-]+$ ]] || { echo "claude-init: invalid version '$INPUT_VERSION'"; exit 1; }
        [[ "$INPUT_TARGETS" =~ ^[A-Za-z0-9,_-]+$ ]] || { echo "claude-init: invalid targets '$INPUT_TARGETS'"; exit 1; }
        read -r -a EXTRA_ARGS <<< "$INPUT_ARGS"
        npx -y "@horiastanxd/claude-init@${INPUT_VERSION}" \
          "$INPUT_COMMAND" "$INPUT_DIRECTORY" -t "$INPUT_TARGETS" "${EXTRA_ARGS[@]}"
